[pytest]
minversion = 7.0

# Default options for all test runs
addopts =
    --tb=short
    --strict-markers

# Markers used in this project
markers =
    unit: Unit tests — no external services needed
    integration: Integration tests — requires Docker Compose stack running
    infra: Infrastructure tests — requires terraform and shellcheck installed

# Test discovery
testpaths =
    services/api-gateway
    services/worker
    tests
