services:
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    image: anpe-api-gateway:local
    container_name: anpe-api-gateway
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - anpe-net
    restart: unless-stopped

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    image: anpe-worker:local
    container_name: anpe-worker
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/metrics')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - anpe-net
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: anpe-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - anpe-net
    restart: unless-stopped
    depends_on:
      - api-gateway
      - worker

  grafana:
    image: grafana/grafana:13.0.1
    container_name: anpe-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/anpe.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro,z
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro,z
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - anpe-net
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  anpe-net:
    driver: bridge

volumes:
  grafana-data: