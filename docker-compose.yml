services:
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    image: ghcr.io/jegorik/anpe-api-gateway:latest
    container_name: anpe-api-gateway
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - anpe-net
    restart: unless-stopped

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    image: ghcr.io/jegorik/anpe-worker:latest
    container_name: anpe-worker
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/metrics')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - anpe-net
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy

networks:
  anpe-net:
    driver: bridge